name: Build Android APK

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest'

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: Frontend/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('Frontend/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: Frontend/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('Frontend/android/**/*.gradle*') }}

      - name: Generate version
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          DATE_TAG=$(date +'%Y.%m.%d')
          VERSION_CODE=$COMMIT_COUNT
          VERSION_NAME="${DATE_TAG}-build${COMMIT_COUNT}"
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "versionName=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME (code: $VERSION_CODE)"

      - name: Build Next.js static export
        run: |
          mv src/proxy.ts src/proxy.ts.bak || true
          APK_BUILD=true NEXT_PUBLIC_API_URL=https://humble-wonder-production-913c.up.railway.app pnpm build
          mv src/proxy.ts.bak src/proxy.ts || true

      - name: Copy export to out/
        run: |
          node scripts/copy-export.js
          if [ ! -f out/index.html ]; then echo "ERROR: out/index.html missing!"; exit 1; fi
          echo "out/index.html OK"

      - name: Add Android + Sync
        run: |
          rm -rf android
          npx cap add android 2>&1
          npx cap sync android 2>&1
          ls -la android/gradlew 2>/dev/null && echo "gradlew OK" || exit 1

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/cyberfrost.keystore
          chmod 600 $HOME/cyberfrost.keystore
          echo "Keystore decoded to $HOME/cyberfrost.keystore"

      - name: Set version + signing in build.gradle
        run: |
          cd android/app
          # Set version
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.versionCode }}/" build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ steps.version.outputs.versionName }}\"/" build.gradle
          # Inject signing config using simple echo (no complex sed escaping)
          echo "" >> build.gradle
          echo "android.signingConfigs.release.storeFile = file(System.getProperty('user.home') + '/cyberfrost.keystore')" >> build.gradle
          echo "android.signingConfigs.release.storePassword = '${{ secrets.KEYSTORE_PASSWORD }}'" >> build.gradle
          echo "android.signingConfigs.release.keyAlias = '${{ secrets.KEY_ALIAS }}'" >> build.gradle
          echo "android.signingConfigs.release.keyPassword = '${{ secrets.KEY_PASSWORD }}'" >> build.gradle
          # Enable signing for release build (replace existing release block)
          sed -i 's/release {/release {\n            signingConfig signingConfigs.release/' build.gradle
          echo "Version + signing configured"

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build Signed Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cyberfrost-apk-debug-v${{ steps.version.outputs.versionName }}
          path: Frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: cyberfrost-apk-release-signed-v${{ steps.version.outputs.versionName }}
          path: Frontend/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          retention-days: 30
