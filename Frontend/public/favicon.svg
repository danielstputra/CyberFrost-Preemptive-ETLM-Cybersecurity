<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1F2E;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0B0F14"/>

  <!-- Outer hexagon shield -->
  <path d="M256 30 L450 150 L450 340 L256 482 L62 340 L62 150 Z"
        fill="url(#innerGrad)" stroke="url(#shieldGrad)" stroke-width="8" filter="url(#glow)"/>

  <!-- Inner hexagon ring -->
  <path d="M256 70 L400 165 L400 315 L256 430 L112 315 L112 165 Z"
        fill="none" stroke="url(#shieldGrad)" stroke-width="2" opacity="0.3"/>

  <!-- Shield emblem -->
  <path d="M256 110 L370 180 L370 290 L256 380 L142 290 L142 180 Z"
        fill="rgba(0,246,255,0.05)" stroke="url(#shieldGrad)" stroke-width="3"/>

  <!-- Frost/cyber central icon - stylized C -->
  <text x="256" y="280" font-family="monospace" font-size="140" font-weight="bold"
        fill="url(#shieldGrad)" text-anchor="middle" dominant-baseline="middle"
        filter="url(#innerGlow)">CF</text>

  <!-- Small decorative dots at hexagon points -->
  <circle cx="256" cy="30" r="6" fill="#00F6FF" filter="url(#glow)"/>
  <circle cx="450" cy="150" r="6" fill="#00F6FF" filter="url(#glow)"/>
  <circle cx="450" cy="340" r="6" fill="#00F6FF" filter="url(#glow)"/>
  <circle cx="256" cy="482" r="6" fill="#00F6FF" filter="url(#glow)"/>
  <circle cx="62" cy="340" r="6" fill="#00F6FF" filter="url(#glow)"/>
  <circle cx="62" cy="150" r="6" fill="#00F6FF" filter="url(#glow)"/>

  <!-- Scanning line animation effect -->
  <line x1="100" y1="256" x2="412" y2="256" stroke="#00F6FF" stroke-width="2"
        opacity="0.4" filter="url(#glow)"/>
  <line x1="100" y1="256" x2="412" y2="256" stroke="#00F6FF" stroke-width="0.5"
        stroke-dasharray="8 12" opacity="0.8"/>

  <!-- Corner accents -->
  <path d="M440 440 L440 400 L400 440 Z" fill="#00F6FF" opacity="0.5"/>
  <path d="M72 72 L72 112 L112 72 Z" fill="#00F6FF" opacity="0.5"/>
</svg>
