name: Build Android APK

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest'

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: Frontend/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('Frontend/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: Frontend/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('Frontend/android/**/*.gradle*') }}

      - name: Build Next.js static export
        run: |
          mv src/proxy.ts src/proxy.ts.bak || true
          NEXT_PUBLIC_API_URL=https://humble-wonder-production-913c.up.railway.app pnpm build
          mv src/proxy.ts.bak src/proxy.ts || true

      - name: Copy export to out/
        run: |
          node scripts/copy-export.js
          # Pastikan out/index.html ada
          if [ ! -f out/index.html ] && [ -f out/index/index.html ]; then
            cp out/index/index.html out/index.html
            echo "Created out/index.html from out/index/"
          fi
          if [ ! -f out/index.html ]; then
            echo "ERROR: out/index.html not found!"
            ls -la out/ 2>/dev/null || echo "out/ empty or missing"
            exit 1
          fi
          echo "out/index.html OK"

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cyberfrost-apk-debug
          path: Frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30
